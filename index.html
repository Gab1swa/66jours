<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#0D0D0D;
  color:#EDEDED;
}

.container{
  max-width:420px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-weight:400;
  font-size:18px;
  margin-bottom:20px;
  opacity:.7;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:transparent;
  border:1px solid #222;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:white;
  color:black;
  border:none;
  cursor:pointer;
}

.hidden{display:none}

.habit{
  border:1px solid #222;
  padding:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.habit.active{
  border-color:#00FFAA;
}

/* FULLSCREEN GRID */
.fullscreen{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  padding:40px;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
  font-size:13px;
  opacity:.6;
}

.grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(11,1fr);
  gap:6px;
}

.cell{
  background:#1A1A1A;
  aspect-ratio:1;
  cursor:pointer;
  transition:.2s;
}

.cell.active{
  background:#00FFAA;
}

.cell.locked{
  opacity:.2;
  cursor:not-allowed;
}

.progress{
  margin-top:15px;
  font-size:13px;
  opacity:.6;
}
</style>
</head>
<body>

<div class="container" id="auth">
  <h1>Connexion</h1>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Mot de passe">
  <button onclick="login()">Continuer</button>
</div>

<div class="container hidden" id="habits">
  <h1>Habitudes</h1>
  <div id="list"></div>
  <input id="newHabit" placeholder="Nouvelle habitude">
  <button onclick="addHabit()">Ajouter</button>
  <button onclick="start()">Commencer</button>
</div>

<div id="tracker" class="fullscreen hidden">
  <div class="topbar">
    <div id="habitName"></div>
    <div id="dayInfo"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="progress" id="progress"></div>
</div>

<script>
let habits = JSON.parse(localStorage.getItem('habits')||'[]');
let data = JSON.parse(localStorage.getItem('data')||'{}');
let startDate = localStorage.getItem('startDate');

function login(){
  auth.classList.add('hidden');
  habitsDiv.classList.remove('hidden');
  render();
}

const auth=document.getElementById('auth');
const habitsDiv=document.getElementById('habits');

function render(){
  list.innerHTML='';
  habits.forEach(h=>{
    let d=document.createElement('div');
    d.className='habit';
    d.innerText=h;
    d.onclick=()=>d.classList.toggle('active');
    list.appendChild(d);
  });
}

function addHabit(){
  let v=newHabit.value;
  if(v){
    habits.push(v);
    localStorage.setItem('habits',JSON.stringify(habits));
    render();
  }
}

function start(){
  let selected=[...document.querySelectorAll('.habit.active')].map(e=>e.innerText);
  if(selected.length===0) selected=habits;

  let habit=selected[0];
  data[habit]=data[habit]||Array(66).fill(false);

  if(!startDate){
    startDate=new Date().toISOString();
    localStorage.setItem('startDate',startDate);
  }

  localStorage.setItem('data',JSON.stringify(data));

  habitsDiv.classList.add('hidden');
  tracker.classList.remove('hidden');
  renderGrid(habit);
}

function renderGrid(habit){
  habitName.innerText=habit;

  let gridEl=document.getElementById('grid');
  gridEl.innerHTML='';

  let start=new Date(startDate);
  let today=new Date();
  let diff=Math.floor((today-start)/(1000*60*60*24));

  data[habit].forEach((v,i)=>{
    let c=document.createElement('div');

    if(i>diff) c.className='cell locked';
    else c.className='cell'+(v?' active':'');

    if(i<=diff){
      c.onclick=()=>{
        data[habit][i]=!data[habit][i];
        localStorage.setItem('data',JSON.stringify(data));
        renderGrid(habit);
      }
    }

    gridEl.appendChild(c);
  });

  dayInfo.innerText = 'Jour ' + Math.min(diff+1,66) + '/66';

  let done=data[habit].filter(x=>x).length;
  progress.innerText = done + '/66 complétés';
}
</script>

</body>
</html>
